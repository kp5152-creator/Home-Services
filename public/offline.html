<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#40584d" />
    <title>EstateIQ</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f1e8;
        color: #24362f;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      main {
        width: min(100%, 420px);
      }

      img {
        width: min(100%, 260px);
        height: auto;
        border-radius: 20px;
        display: block;
        margin-bottom: 26px;
      }

      h1 {
        font-size: 2rem;
        line-height: 1.05;
        margin: 0 0 14px;
      }

      p {
        font-size: 1rem;
        line-height: 1.65;
        margin: 0;
        color: #51655b;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/estateiq-logo.png" alt="EstateIQ" />
      <h1>You are offline</h1>
      <p>
        EstateIQ is installed and ready. Reconnect to the internet to load current property and
        inspection records.
      </p>
    </main>
  </body>
</html>
